<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    ServerName koron.org
    ServerAlias www.koron.org

    DocumentRoot /var/www/html

    # --- Flask アプリを mod_wsgi 経由で動かす設定 ---
    WSGIDaemonProcess my_project_https \
        python-home=/var/www/html/my_project/venv \
        python-path=/var/www/html/my_project
    WSGIProcessGroup my_project_https
    WSGIScriptAlias / /var/www/html/my_project/wsgi.py

    <Directory /var/www/html/my_project>
        Require all granted

        # --- CORS ヘッダーを追加 ---
        Header set Access-Control-Allow-Origin "https://www.koron.org"
        Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Header set Access-Control-Allow-Headers "Content-Type, Authorization"
    </Directory>

    # --- SSL 証明書設定 (Let's Encrypt) ---
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/koron.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/koron.org/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
</IfModule>
