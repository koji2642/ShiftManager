<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ month }} 月間シフト表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
  <style>

    body {
    font-family: "Zen Maru Gothic", sans-serif;
    font-weight: 400;
    font-style: normal;
    font-size: 10px;   /* 全体を小さめに */
    margin: 0;
    background: #fff;
    color: #000;
    transform: scale(0.47);
    transform-origin: top left;
    }

    h2 {
    margin: 0 auto 10px auto;
    display: block;
    width: 100%;
    font-size: 16px;   /* タイトルは見やすく */
    text-align: center;
    transform: translateX(50%);
    }

    table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    margin: 0 auto;
    font-size: 9px;    /* テーブル内フォントをさらに縮小 */
    }

    th, td {
    border: 1px solid #999;
    padding: 3px;
    text-align: center;
    word-break: break-word;
    }

    td.name {
    font-size: 11px;
    font-weight: bold;
    text-align: left;
    padding-left: 8px;
    }

    th:not(:first-child), td:not(:first-child) { width: 60px; }
    th:first-child, td:first-child { width: 140px; }

    @page {
    size: A4 landscape;
    margin: 8mm;
    }



    /* 勤務種別の色分け */
    .sp-leave { background: #cce5ff; color: #004085; }
    .le-holi { background: #f8d7da; color: #721c24; }
    .an-leave { background: #fff3cd; color: #856404; }
    .HalfDayOffInTheMorning { background: linear-gradient(90deg, #fff3cd 50%, #d1e7dd 50%); }
    .AfternoonHalfOff { background: linear-gradient(90deg, #d1e7dd 50%, #fff3cd 50%); }
    .office { background: #d1e7dd; }
    .outside { background: #f5f5f5; }
    .night { background: linear-gradient(135deg, #d8bfd8 70%, #d3d3d3 30%); }
    .office-site { background: linear-gradient(90deg, #d1e7dd 50%, #ffff99 50%); }
    .site { background: #ffff99; }
    .double { background: linear-gradient(135deg, #d1e7dd 50%, #d8bfd8 80%, #d3d3d3 100%); color: #000; }
    .sp-holiday-night { background: linear-gradient(135deg, #cce5ff 50%, #d8bfd8 80%, #d3d3d3 100%); color: #000; }
    .off-duty { background: #d3d3d3; }
    .important { background: #ff3366; }
  </style>
</head>
<body>
  <h2>{{ month }} 月間シフト表</h2>
  <table>
    <!-- 日付行 -->
    <tr>
      <th>日付</th>
      {% for d in range(1, days+1) %}
        <th>{{ d }}</th>
      {% endfor %}
    </tr>
    <!-- 曜日行 -->
    <tr>
      <th>曜日</th>
      {% for dow in weekdays %}
        <td>{{ dow }}</td>
      {% endfor %}
    </tr>
    <!-- シフト行 -->
    {% for person in people %}
    <tr>
      <td class="name">{{ person.name }}</td>
      {% for shift in person.shifts %}
        <td class="{{ shift.cls }}">
          {{ shift.type }}
          {% if shift.work %}
            <div style="font-size:10px; margin-top:2px;">{{ shift.work }}</div>
          {% endif %}
        </td>
      {% endfor %}
    </tr>
    {% endfor %}
  </table>
</body>
</html>
